# Render Blueprint Specification for Aletheia
# https://render.com/docs/blueprints

services:
  - type: web
    name: aletheia-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: ALETHEIA_API_KEY
        sync: false # Set this in the Render dashboard if you want custom API authentication
